<!DOCTYPE html>
<html>
<head>
    <title>OLP Subscription</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h2 {
            margin: 0;
            font-size: 18px;
            text-align: center;
            color: #4f46e5;
        }
        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
        }
        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        .status {
            font-size: 13px;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
        }
        .valid { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .invalid { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .expiry { font-size: 11px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>OLP License</h2>
        <div id="statusBox" class="status">Checking status...</div>
        <input type="text" id="licenseKey" placeholder="Enter License Key">
        <button id="saveBtn">Activate License</button>
        <div id="expiryText" class="expiry"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
